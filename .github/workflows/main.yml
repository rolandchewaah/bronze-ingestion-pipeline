name: main

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: development
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_DEV }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_DEV }}

      # The workspace repo path where Databricks Repo will live
      REPOSITORY_PATH: /Workspace/Users/rollux2013@gmail.com/bronze-ingestion-pipeline

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Extract branch name
        id: extract_branch_dev
        run: echo "branch=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"

      - name: Update Databricks Repo (Dev)
        run: |
          databricks repos update "$({ env.REPO_PATH })\
            --branch "$({ steps.extract_branch_dev.outputs.branch)}
